<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="cGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a" />
      <stop offset="100%" stop-color="#3b82f6" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#0ea5e9" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="2" dy="4" stdDeviation="3" flood-opacity="0.3" />
    </filter>
  </defs>

  <!-- C Shape -->
  <path d="M 75,25 A 35,35 0 1,0 75,85" fill="none" stroke="url(#cGrad)" stroke-width="18" stroke-linecap="round" filter="url(#shadow)" />
  
  <!-- Arrow Path -->
  <path d="M 20,65 L 45,45 L 55,55 L 85,25" fill="none" stroke="url(#arrowGrad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" />
  
  <!-- Arrow Head -->
  <polygon points="90,15 75,25 85,35" fill="#0ea5e9" filter="url(#shadow)" />
</svg>
